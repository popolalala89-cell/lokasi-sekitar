name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm install
        
    - name: Sync Capacitor
      run: npx cap sync android
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
        
    - name: Build Debug APK
      run: |
        cd android
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
        fi
        chmod +x gradlew
        ./gradlew assembleDebug
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: lokasi-sekitar-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Decode Keystore
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd android/app
        echo "$ANDROID_KEYSTORE" | tr -d '\n\r\t ' | base64 -d > keystore.jks
        if [ ! -s keystore.jks ]; then echo "ERROR: Keystore empty"; exit 1; fi
        echo "Keystore size: $(wc -c < keystore.jks) bytes"
      env:
        ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}
        
    - name: Build Release APK
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd android
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=app/keystore.jks \
          -Pandroid.injected.signing.store.password="$KEYSTORE_PASS" \
          -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
          -Pandroid.injected.signing.key.password="$KEY_PASS"
      env:
        KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        
    - name: Upload Release APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: lokasi-sekitar-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
