<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lokasi Sekitar</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: sans-serif; background:#f5f5f5; min-height:100vh; }
    .screen { display:none; min-height:100vh; flex-direction:column; }
    .screen.active { display:flex; }
    .header { background:linear-gradient(135deg,#FF6B35,#F7931E); color:white; padding:16px; text-align:center; }
    .content { flex:1; padding:20px; max-width:400px; width:100%; margin:0 auto; }
    .card { background:white; border-radius:16px; padding:24px; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
    .form-group { margin-bottom:12px; }
    .form-group label { font-size:13px; color:#666; }
    .form-group input, .form-group select { width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; font-size:14px; margin-top:4px; }
    .btn { width:100%; padding:14px; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; margin-top:8px; }
    .btn-orange { background:#FF6B35; color:white; }
    .btn-white { background:white; color:#333; border:1px solid #ddd; }
    .link { text-align:center; margin-top:12px; font-size:13px; color:#FF6B35; cursor:pointer; }
    .status { text-align:center; padding:10px; font-size:14px; }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
    .stat { background:white; border-radius:12px; padding:16px; text-align:center; }
    .stat-num { font-size:24px; font-weight:700; color:#FF6B35; }
    .stat-lbl { font-size:11px; color:#888; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="content" style="justify-content:center;">
    <div class="card">
      <h2 style="text-align:center;color:#FF6B35;margin-bottom:16px;">📍 Lokasi Sekitar</h2>
      <p style="text-align:center;color:#888;font-size:11px;margin-bottom:14px;">v3.0 — Minimal Test</p>
      <div class="form-group"><input id="loginEmail" type="email" placeholder="Email"></div>
      <div class="form-group"><input id="loginPassword" type="password" placeholder="Password"></div>
      <button class="btn btn-orange" onclick="doLogin()">Masuk</button>
      <div class="link" onclick="goTo('register')">Belum punya akun? Daftar</div>
    </div>
  </div>
</div>

<!-- REGISTER -->
<div id="register" class="screen">
  <div class="content" style="justify-content:center;">
    <div class="card">
      <h2 style="text-align:center;color:#FF6B35;margin-bottom:16px;">📝 Daftar</h2>
      <div class="form-group"><input id="regNama" type="text" placeholder="Nama lengkap"></div>
      <div class="form-group"><input id="regEmail" type="email" placeholder="Email"></div>
      <div class="form-group"><input id="regPassword" type="password" placeholder="Password (min 6)"></div>
      <div class="form-group">
        <select id="regRole"><option value="informan">🔍 Informan</option><option value="pedagang">🛒 Pedagang</option></select>
      </div>
      <button class="btn btn-orange" onclick="doRegister()">Daftar</button>
      <div class="link" onclick="goTo('login')">Sudah punya akun? Masuk</div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
  <div class="header"><h1>🛡️ Admin Panel</h1><p id="adminUser"></p></div>
  <div class="content">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="s1">-</div><div class="stat-lbl">Lokasi</div></div>
      <div class="stat"><div class="stat-num" id="s2">-</div><div class="stat-lbl">User</div></div>
    </div>
    <button class="btn btn-white" onclick="doLogout()">Keluar</button>
  </div>
</div>

<!-- INFORMAN -->
<div id="informan" class="screen">
  <div class="header"><h1>🔍 Informan</h1><p id="informanUser"></p></div>
  <div class="content">
    <div class="status" id="informanStatus">Siap melaporkan PKL</div>
    <button class="btn btn-orange" onclick="shareLoc()">📍 Laporkan PKL</button>
    <button class="btn btn-white" onclick="doLogout()" style="margin-top:20px;">Keluar</button>
  </div>
</div>

<!-- PEDAGANG -->
<div id="pedagang" class="screen">
  <div class="header"><h1>🛒 Pedagang</h1><p id="pedagangUser"></p></div>
  <div class="content">
    <button class="btn btn-orange" onclick="alert('Fitur segera hadir')">📦 Daftar Dagangan</button>
    <button class="btn btn-white" onclick="doLogout()" style="margin-top:20px;">Keluar</button>
  </div>
</div>

<script src="lib/supabase.min.js"></script>
<script>
// ===== SIMPLE INIT =====
var db = null;
var user = null;
var profile = null;
var SUPABASE_URL = 'https://dnpbyfpbbwkgsfwmzlva.supabase.co';
var SUPABASE_KEY = 'sb_publishable_XV71tP1dBZMyHg30p3aWIw_Phv5hbay';

function init() {
  if (typeof supabase !== 'undefined') {
    db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    checkSession();
  } else {
    setTimeout(init, 500);
  }
}

async function checkSession() {
  try {
    var res = await db.auth.getSession();
    if (res.data.session) {
      user = res.data.session.user;
      var p = await db.from('profiles').select('*').eq('id', user.id).single();
      profile = p.data;
      goTo(profile.role);
    }
  } catch(e) {
    console.log('Not logged in');
  }
}

function goTo(screen) {
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(screen).classList.add('active');
  
  if (screen === 'admin') {
    document.getElementById('adminUser').textContent = profile ? profile.nama : '';
    loadAdmin();
  }
  if (screen === 'informan') document.getElementById('informanUser').textContent = profile ? profile.nama : '';
  if (screen === 'pedagang') document.getElementById('pedagangUser').textContent = profile ? profile.nama : '';
}

// ===== AUTH =====
async function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var pass = document.getElementById('loginPassword').value.trim();
  if (!email || !pass) { alert('Isi email dan password'); return; }
  
  var res = await db.auth.signInWithPassword({ email: email, password: pass });
  if (res.error) { alert('Gagal: ' + res.error.message); return; }
  
  user = res.data.user;
  var p = await db.from('profiles').select('*').eq('id', user.id).single();
  profile = p.data;
  goTo(profile.role);
}

async function doRegister() {
  var nama = document.getElementById('regNama').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var pass = document.getElementById('regPassword').value.trim();
  var role = document.getElementById('regRole').value;
  
  if (!nama || !email || !pass) { alert('Isi semua field'); return; }
  if (pass.length < 6) { alert('Password minimal 6 karakter'); return; }
  
  var res = await db.auth.signUp({ email: email, password: pass });
  if (res.error) { alert('Gagal: ' + res.error.message); return; }
  
  // Update profile
  await db.from('profiles').update({ nama: nama, role: role }).eq('id', res.data.user.id);
  
  alert('✅ Registrasi berhasil! Silakan login.');
  goTo('login');
}

async function doLogout() {
  await db.auth.signOut();
  user = null;
  profile = null;
  goTo('login');
}

async function loadAdmin() {
  var l = await db.from('lokasi').select('id', { count: 'exact', head: true });
  var u = await db.from('profiles').select('id', { count: 'exact', head: true });
  document.getElementById('s1').textContent = l.count || 0;
  document.getElementById('s2').textContent = u.count || 0;
}

function shareLoc() {
  if (!navigator.geolocation) { alert('GPS tidak didukung'); return; }
  document.getElementById('informanStatus').textContent = 'Mengambil lokasi...';
  
  navigator.geolocation.getCurrentPosition(async function(pos) {
    var res = await db.from('lokasi').insert({
      user_id: user.id,
      latitude: pos.coords.latitude,
      longitude: pos.coords.longitude,
      deskripsi: 'PKL ditemukan',
      status: 'aktif'
    });
    
    if (res.error) {
      document.getElementById('informanStatus').textContent = '❌ Gagal: ' + res.error.message;
    } else {
      document.getElementById('informanStatus').textContent = '✅ Lokasi tersimpan! Lat:' + pos.coords.latitude.toFixed(5);
      setTimeout(function() {
        document.getElementById('informanStatus').textContent = 'Siap melaporkan PKL';
      }, 3000);
    }
  }, function(err) {
    document.getElementById('informanStatus').textContent = '❌ ' + err.message;
  });
}

// Start
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
