<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#FF6B35">
  <title>Lokasi Sekitar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #FF6B35 0%, #F7931E 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: white;
    }
    
    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }
    
    .subtitle {
      font-size: 14px;
      opacity: 0.9;
      margin-bottom: 30px;
    }
    
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 20px;
    }
    
    .status {
      font-size: 16px;
      color: #333;
      margin-bottom: 20px;
    }
    
    .btn {
      background: #FF6B35;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 15px rgba(255,107,53,0.3);
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      margin-top: 10px;
      box-shadow: none;
    }
    
    .info {
      font-size: 12px;
      color: #666;
      margin-top: 15px;
      line-height: 1.5;
    }
    
    .logo {
      font-size: 48px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">📍</div>
    <h1>Lokasi Sekitar</h1>
    <p class="subtitle">Crowdsourcing PKL di sekitar kamu</p>
    
    <div class="card">
      <p class="status" id="status">Siap digunakan!</p>
      <button class="btn" onclick="shareLocation()">📍 Bagikan Lokasi</button>
      <button class="btn btn-secondary" onclick="viewLocations()">🗺️ Lihat Lokasi</button>
      <p class="info">
        Bantu pedagang PKL dengan membagikan lokasi ramai di sekitar kamu. 
        Data tersimpan aman dan bisa diakses via Telegram bot.
      </p>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>
