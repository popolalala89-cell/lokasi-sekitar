name: Build Android APK

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        npm install
        
    - name: Sync Capacitor
      run: |
        npx cap sync android
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
        
    - name: Build Debug APK
      run: |
        cd android
        # Download gradle-wrapper.jar if not exists
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
        fi
        chmod +x gradlew
        ./gradlew assembleDebug
        
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: lokasi-sekitar-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30
        
    - name: Build Release APK (on tag)
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd android
        printf '%s' "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > app/keystore.jks 2>/dev/null
        if [ ! -s app/keystore.jks ]; then
          echo "ERROR: Keystore file is empty or decoding failed"
          exit 1
        fi
        file app/keystore.jks
        ./gradlew assembleRelease \
          -Pandroid.injected.signing.store.file=keystore.jks \
          -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
          -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
          -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
          
    - name: Upload Release APK
      if: startsWith(github.ref, 'refs/tags/v')
      uses: actions/upload-artifact@v4
      with:
        name: lokasi-sekitar-release
        path: android/app/build/outputs/apk/release/app-release.apk
        retention-days: 30
