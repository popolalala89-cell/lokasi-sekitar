<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Login</title>
  <style>
    body { font-family: sans-serif; background: #f5f5f5; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
    .box { background:white; padding:30px; border-radius:16px; width:90%; max-width:350px; text-align:center; box-shadow:0 4px 20px rgba(0,0,0,0.1); }
    input { width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; margin-bottom:10px; font-size:14px; }
    .btn { width:100%; padding:14px; background:#FF6B35; color:white; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer; margin-top:5px; }
    .link { color:#FF6B35; font-size:13px; cursor:pointer; margin-top:10px; }
  </style>
</head>
<body>
<div class="box">
  <h2 style="color:#FF6B35;">📍 Lokasi Sekitar</h2>
  <p style="font-size:12px;color:#888;">v1.3.3 — Test</p>
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button class="btn" onclick="login()">Masuk</button>
  <div class="link" onclick="alert('Register screen')">Daftar</div>
</div>

<script src="lib/supabase.min.js"></script>
<script>
var db = null;

function init() {
  alert('INIT: supabase=' + (typeof supabase !== 'undefined' ? 'LOADED' : 'MISSING'));
  if (typeof supabase !== 'undefined') {
    db = supabase.createClient(
      'https://dnpbyfpbbwkgsfwmzlva.supabase.co',
      'sb_publishable_XV71tP1dBZMyHg30p3aWIw_Phv5hbay'
    );
    alert('INIT: db created OK');
    checkSession();
  } else {
    setTimeout(init, 1000);
  }
}

async function checkSession() {
  try {
    var r = await db.auth.getSession();
    alert('Session: ' + (r.data.session ? 'LOGGED IN' : 'No session'));
  } catch(e) {
    alert('Session error: ' + e.message);
  }
}

async function login() {
  if (!db) { alert('DB not ready yet'); return; }
  var e = document.getElementById('email').value;
  var p = document.getElementById('password').value;
  if (!e || !p) { alert('Isi email dan password'); return; }
  try {
    var r = await db.auth.signInWithPassword({ email: e, password: p });
    if (r.error) { alert('GAGAL: ' + r.error.message); }
    else { alert('SUKSES! Role: akan dicek...'); }
  } catch(err) { alert('ERROR: ' + err.message); }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
