<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lokasi Sekitar</title>
  <link rel="stylesheet" href="lib/leaflet.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: sans-serif; background:#f5f5f5; min-height:100vh; }
    .screen { display:none; min-height:100vh; flex-direction:column; }
    .screen.active { display:flex; }
    .header { background:linear-gradient(135deg,#FF6B35,#F7931E); color:white; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; }
    .header h1 { font-size:16px; }
    .header-sub { font-size:11px; opacity:0.8; }
    .btn-sm { padding:6px 12px; border-radius:6px; font-size:12px; cursor:pointer; border:none; }
    .btn-outline { background:rgba(255,255,255,0.2); color:white; }
    .btn-orange { background:#FF6B35; color:white; }
    .btn-white { background:white; color:#333; border:1px solid #ddd; }
    .btn-red { background:#dc3545; color:white; }
    .btn-green { background:#28a745; color:white; }
    .content { flex:1; padding:16px; max-width:600px; width:100%; margin:0 auto; overflow-y:auto; }
    .card { background:white; border-radius:12px; padding:16px; box-shadow:0 2px 8px rgba(0,0,0,0.06); margin-bottom:12px; }
    .form-group { margin-bottom:10px; }
    .form-group input, .form-group select, .form-group textarea { width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:14px; }
    .btn-big { width:100%; padding:14px; border:none; border-radius:10px; font-size:15px; font-weight:600; cursor:pointer; margin-bottom:8px; }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .stat { background:white; border-radius:10px; padding:14px; text-align:center; }
    .stat-num { font-size:22px; font-weight:700; color:#FF6B35; }
    .stat-lbl { font-size:10px; color:#888; }
    .link { text-align:center; margin-top:10px; font-size:13px; color:#FF6B35; cursor:pointer; }
    .status { text-align:center; padding:8px; font-size:13px; color:#666; }
    .table-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #eee; font-size:13px; }
    .badge { padding:2px 8px; border-radius:8px; font-size:10px; font-weight:600; }
    .badge-aktif { background:#fff3cd; color:#856404; }
    .badge-diverifikasi { background:#d4edda; color:#155724; }
    .badge-ditolak { background:#f8d7da; color:#721C24; }
    #map { height:300px; border-radius:10px; }
    .map-full { flex:1; width:100%; min-height:300px; }
    .toolbar { display:flex; gap:6px; padding:8px; background:white; border-bottom:1px solid #eee; flex-wrap:wrap; }
  </style>
</head>
<body>

<!-- ====== LOGIN ====== -->
<div id="login" class="screen active">
  <div class="content" style="justify-content:center;">
    <div class="card">
      <h2 style="text-align:center;color:#FF6B35;">📍 Lokasi Sekitar</h2>
      <p style="text-align:center;color:#888;font-size:10px;">v3.1 — Full Edition</p>
      <div class="form-group"><input id="loginEmail" type="email" placeholder="Email"></div>
      <div class="form-group"><input id="loginPassword" type="password" placeholder="Password"></div>
      <button class="btn-big btn-orange" onclick="doLogin()">Masuk</button>
      <div class="link" onclick="goTo('register')">Belum punya akun? Daftar</div>
    </div>
  </div>
</div>

<!-- ====== REGISTER ====== -->
<div id="register" class="screen">
  <div class="content" style="justify-content:center;">
    <div class="card">
      <h2 style="text-align:center;color:#FF6B35;">📝 Daftar</h2>
      <div class="form-group"><input id="regNama" type="text" placeholder="Nama lengkap"></div>
      <div class="form-group"><input id="regEmail" type="email" placeholder="Email"></div>
      <div class="form-group"><input id="regPassword" type="password" placeholder="Password (min 6)"></div>
      <div class="form-group">
        <select id="regRole"><option value="informan">🔍 Informan</option><option value="pedagang">🛒 Pedagang</option></select>
      </div>
      <button class="btn-big btn-orange" onclick="doRegister()">Daftar</button>
      <div class="link" onclick="goTo('login')">Sudah punya akun? Masuk</div>
    </div>
  </div>
</div>

<!-- ====== ADMIN ====== -->
<div id="admin" class="screen">
  <div class="header">
    <div><h1>🛡️ Admin Panel</h1><div class="header-sub" id="adminUser"></div></div>
    <div style="display:flex;gap:6px;">
      <button class="btn-sm btn-outline" onclick="goTo('map')">🗺️</button>
      <button class="btn-sm btn-outline" onclick="doLogout()">Keluar</button>
    </div>
  </div>
  <div class="content">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="sLokasi">-</div><div class="stat-lbl">Total Lokasi</div></div>
      <div class="stat"><div class="stat-num" id="sAktif">-</div><div class="stat-lbl">Aktif</div></div>
      <div class="stat"><div class="stat-num" id="sUser">-</div><div class="stat-lbl">User</div></div>
      <div class="stat"><div class="stat-num" id="sPending">-</div><div class="stat-lbl">Pending</div></div>
    </div>
    <div class="card"><h3 style="font-size:14px;margin-bottom:8px;">📋 Verifikasi Lokasi</h3><div id="adminTable"></div></div>
  </div>
</div>

<!-- ====== INFORMAN ====== -->
<div id="informan" class="screen">
  <div class="header">
    <div><h1>🔍 Informan</h1><div class="header-sub" id="informanUser"></div></div>
    <div style="display:flex;gap:6px;">
      <button class="btn-sm btn-outline" onclick="goTo('map')">🗺️</button>
      <button class="btn-sm btn-outline" onclick="doLogout()">Keluar</button>
    </div>
  </div>
  <div class="content">
    <div class="status" id="informanStatus">Siap melaporkan PKL</div>
    <button class="btn-big btn-orange" onclick="shareLoc()">📍 Laporkan PKL Cepat</button>
    <button class="btn-big btn-white" onclick="laporkanDetail()">📝 Laporan Detail</button>
    <button class="btn-big btn-white" onclick="goTo('map')">🗺️ Lihat Peta</button>
  </div>
</div>

<!-- ====== PEDAGANG ====== -->
<div id="pedagang" class="screen">
  <div class="header">
    <div><h1>🛒 Pedagang</h1><div class="header-sub" id="pedagangUser"></div></div>
    <div style="display:flex;gap:6px;">
      <button class="btn-sm btn-outline" onclick="goTo('map')">🗺️</button>
      <button class="btn-sm btn-outline" onclick="doLogout()">Keluar</button>
    </div>
  </div>
  <div class="content">
    <button class="btn-big btn-orange" onclick="daftarProduk()">📦 Daftarkan Produk</button>
    <button class="btn-big btn-white" onclick="goTo('map')">🗺️ Lihat Peta</button>
    <button class="btn-big btn-white" onclick="goTo('informan'); profile.role='informan';">🔍 Mode Informan</button>
  </div>
</div>

<!-- ====== MAP ====== -->
<div id="map" class="screen">
  <div class="header">
    <div><h1>🗺️ Peta PKL</h1></div>
    <div style="display:flex;gap:6px;">
      <button class="btn-sm btn-outline" onclick="centerMyLoc()">🎯</button>
      <button class="btn-sm btn-outline" onclick="goBack()">←</button>
    </div>
  </div>
  <div class="toolbar">
    <button class="btn-sm btn-orange" onclick="refreshMap()">🔄 Refresh</button>
    <button class="btn-sm btn-white" onclick="goBack()">Kembali</button>
  </div>
  <div class="map-full" id="mapContainer"></div>
</div>

<!-- ====== SCRIPTS ====== -->
<script src="lib/supabase.min.js"></script>
<script src="lib/leaflet.js"></script>
<script>
// ===== GLOBALS =====
var db = null;
var user = null;
var profile = null;
var myMap = null;
var markerLayer = null;
var prevScreen = null;
var SUPABASE_URL = 'https://dnpbyfpbbwkgsfwmzlva.supabase.co';
var SUPABASE_KEY = 'sb_publishable_XV71tP1dBZMyHg30p3aWIw_Phv5hbay';

// ===== INIT =====
function init() {
  if (typeof supabase !== 'undefined') {
    db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    checkSession();
  } else {
    setTimeout(init, 500);
  }
}

async function checkSession() {
  try {
    var res = await db.auth.getSession();
    if (res.data.session) {
      user = res.data.session.user;
      var p = await db.from('profiles').select('*').eq('id', user.id).single();
      profile = p.data;
      goTo(profile.role);
    }
  } catch(e) {}
}

function goTo(screen) {
  prevScreen = document.querySelector('.screen.active') ? document.querySelector('.screen.active').id : null;
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  document.getElementById(screen).classList.add('active');
  
  if (screen === 'admin') { document.getElementById('adminUser').textContent = profile ? profile.nama : ''; loadAdmin(); }
  if (screen === 'informan') document.getElementById('informanUser').textContent = profile ? profile.nama : '';
  if (screen === 'pedagang') document.getElementById('pedagangUser').textContent = profile ? profile.nama : '';
  if (screen === 'map') initMap();
}

function goBack() {
  if (prevScreen && document.getElementById(prevScreen)) {
    goTo(prevScreen);
  } else {
    goTo(profile ? profile.role : 'login');
  }
}

// ===== AUTH =====
async function doLogin() {
  var email = document.getElementById('loginEmail').value.trim();
  var pass = document.getElementById('loginPassword').value.trim();
  if (!email || !pass) { alert('Isi email dan password'); return; }
  var res = await db.auth.signInWithPassword({ email: email, password: pass });
  if (res.error) { alert('Gagal: ' + res.error.message); return; }
  user = res.data.user;
  var p = await db.from('profiles').select('*').eq('id', user.id).single();
  profile = p.data;
  goTo(profile.role);
}

async function doRegister() {
  var nama = document.getElementById('regNama').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var pass = document.getElementById('regPassword').value.trim();
  var role = document.getElementById('regRole').value;
  if (!nama || !email || !pass) { alert('Isi semua field'); return; }
  if (pass.length < 6) { alert('Password minimal 6 karakter'); return; }
  var res = await db.auth.signUp({ email: email, password: pass });
  if (res.error) { alert('Gagal: ' + res.error.message); return; }
  await db.from('profiles').update({ nama: nama, role: role }).eq('id', res.data.user.id);
  alert('✅ Registrasi berhasil! Silakan login.');
  goTo('login');
}

async function doLogout() {
  await db.auth.signOut();
  user = null; profile = null;
  goTo('login');
}

// ===== ADMIN =====
async function loadAdmin() {
  var l = await db.from('lokasi').select('id', { count: 'exact', head: true });
  var la = await db.from('lokasi').select('id', { count: 'exact', head: true }).eq('status', 'aktif');
  var u = await db.from('profiles').select('id', { count: 'exact', head: true });
  var lp = await db.from('lokasi').select('id', { count: 'exact', head: true }).eq('status', 'aktif');
  
  document.getElementById('sLokasi').textContent = l.count || 0;
  document.getElementById('sAktif').textContent = la.count || 0;
  document.getElementById('sUser').textContent = u.count || 0;
  document.getElementById('sPending').textContent = lp.count || 0;
  
  var pending = await db.from('lokasi').select('*').order('created_at', { ascending: false }).limit(30);
  var html = '';
  if (pending.data && pending.data.length > 0) {
    pending.data.forEach(function(loc) {
      var badge = '<span class="badge badge-' + loc.status + '">' + loc.status + '</span>';
      html += '<div class="table-row">';
      html += '<div><b>' + (loc.deskripsi || 'Tanpa nama') + '</b><br><small>' + new Date(loc.created_at).toLocaleDateString('id-ID') + ' | ' + badge + '</small></div>';
      html += '<div style="display:flex;gap:4px;">';
      if (loc.status === 'aktif') html += '<button class="btn-sm btn-green" onclick="verifikasi(' + loc.id + ')">✅</button>';
      if (loc.status === 'aktif') html += '<button class="btn-sm btn-red" onclick="tolak(' + loc.id + ')">❌</button>';
      html += '<button class="btn-sm btn-red" onclick="hapusLok(' + loc.id + ')">🗑️</button>';
      html += '</div></div>';
    });
  } else {
    html = '<p style="text-align:center;color:#888;padding:20px;">Belum ada lokasi</p>';
  }
  document.getElementById('adminTable').innerHTML = html;
}

async function verifikasi(id) { await db.from('lokasi').update({ status: 'diverifikasi' }).eq('id', id); loadAdmin(); }
async function tolak(id) { await db.from('lokasi').update({ status: 'ditolak' }).eq('id', id); loadAdmin(); }
async function hapusLok(id) { if (confirm('Hapus permanen?')) { await db.from('lokasi').delete().eq('id', id); loadAdmin(); } }

// ===== INFORMAN =====
function shareLoc() {
  if (!navigator.geolocation) { alert('GPS tidak didukung'); return; }
  document.getElementById('informanStatus').textContent = '📡 Mengambil lokasi...';
  navigator.geolocation.getCurrentPosition(async function(pos) {
    var res = await db.from('lokasi').insert({
      user_id: user.id, latitude: pos.coords.latitude, longitude: pos.coords.longitude,
      deskripsi: 'PKL ditemukan', status: 'aktif'
    });
    if (res.error) { document.getElementById('informanStatus').textContent = '❌ Gagal: ' + res.error.message; }
    else { 
      document.getElementById('informanStatus').textContent = '✅ Tersimpan! (' + pos.coords.latitude.toFixed(4) + ',' + pos.coords.longitude.toFixed(4) + ')';
      setTimeout(function() { document.getElementById('informanStatus').textContent = 'Siap melaporkan PKL'; }, 4000);
    }
  }, function(err) { document.getElementById('informanStatus').textContent = '❌ ' + err.message; });
}

function laporkanDetail() {
  var deskripsi = prompt('Deskripsi PKL (nama/jualan):');
  if (!deskripsi) return;
  var kat = prompt('Kategori:\n1.🍜Makanan 2.🧋Minuman 3.🥬Sayur 4.👗Pakaian 5.💍Aksesoris 6.📱Elektronik 7.📍Lainnya\nPilih nomor:');
  var kid = parseInt(kat) || 7;
  if (kid < 1 || kid > 7) kid = 7;
  
  if (!navigator.geolocation) { alert('GPS tidak didukung'); return; }
  navigator.geolocation.getCurrentPosition(async function(pos) {
    var res = await db.from('lokasi').insert({
      user_id: user.id, latitude: pos.coords.latitude, longitude: pos.coords.longitude,
      deskripsi: deskripsi, kategori_id: kid, status: 'aktif'
    });
    if (res.error) { alert('Gagal: ' + res.error.message); }
    else { alert('✅ Laporan detail tersimpan!'); }
  });
}

// ===== PEDAGANG =====
function daftarProduk() {
  var nama = prompt('Nama produk:');
  if (!nama) return;
  var harga = prompt('Harga (contoh: Rp 10.000):') || '';
  db.from('produk').insert({ user_id: user.id, nama_produk: nama, harga: harga }).then(function(res) {
    if (res.error) { alert('Gagal: ' + res.error.message); }
    else { alert('✅ Produk didaftarkan!'); }
  });
}

// ===== MAP =====
function initMap() {
  setTimeout(function() {
    var container = document.getElementById('mapContainer');
    if (myMap) { myMap.invalidateSize(); loadMarkers(); return; }
    
    // Fix Leaflet icon paths
    L.Icon.Default.imagePath = 'lib/images/';
    
    myMap = L.map('mapContainer').setView([-6.2, 106.8], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(myMap);
    markerLayer = L.layerGroup().addTo(myMap);
    loadMarkers();
  }, 300);
}

async function loadMarkers() {
  if (!myMap || !markerLayer) return;
  markerLayer.clearLayers();
  
  var res = await db.from('lokasi').select('*').in('status', ['aktif','diverifikasi']).order('created_at', { ascending: false });
  if (res.data && res.data.length > 0) {
    var bounds = [];
    res.data.forEach(function(loc) {
      var m = L.marker([loc.latitude, loc.longitude]).addTo(markerLayer);
      m.bindPopup('<b>📍 ' + (loc.deskripsi || 'PKL') + '</b><br><small>' + new Date(loc.created_at).toLocaleDateString('id-ID') + '</small><br><small>Status: ' + loc.status + '</small>');
      bounds.push([loc.latitude, loc.longitude]);
    });
    myMap.fitBounds(bounds, { padding: [30, 30] });
  }
}

function refreshMap() { loadMarkers(); }

function centerMyLoc() {
  if (!myMap) return;
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {
      myMap.setView([pos.coords.latitude, pos.coords.longitude], 15);
      L.circleMarker([pos.coords.latitude, pos.coords.longitude], { radius: 8, color: '#FF6B35', fillColor: '#FF6B35', fillOpacity: 0.5 }).addTo(markerLayer).bindPopup('📍 Posisi kamu');
    });
  }
}

// Start
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
