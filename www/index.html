<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lokasi Sekitar</title>
  <link rel="stylesheet" href="lib/leaflet.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: sans-serif; background:#f5f5f5; min-height:100vh; }
    .screen { display:none; min-height:100vh; flex-direction:column; }
    .screen.active { display:flex; }
    .hdr { background:linear-gradient(135deg,#FF6B35,#F7931E); color:white; padding:12px 16px; display:flex; justify-content:space-between; align-items:center; }
    .hdr h1 { font-size:15px; }
    .hdr-sub { font-size:10px; opacity:0.8; }
    .btn-sm { padding:5px 10px; border-radius:5px; font-size:11px; cursor:pointer; border:none; }
    .btn-out { background:rgba(255,255,255,0.2); color:white; }
    .btn-o { background:#FF6B35; color:white; }
    .btn-w { background:white; color:#333; border:1px solid #ddd; }
    .btn-g { background:#28a745; color:white; }
    .btn-r { background:#dc3545; color:white; }
    .cont { flex:1; padding:12px; max-width:600px; width:100%; margin:0 auto; overflow-y:auto; }
    .card { background:white; border-radius:10px; padding:14px; box-shadow:0 1px 6px rgba(0,0,0,0.05); margin-bottom:10px; }
    .fg { margin-bottom:10px; }
    .fg label { display:block; font-size:12px; color:#666; margin-bottom:3px; font-weight:600; }
    .fg input, .fg select, .fg textarea { width:100%; padding:10px; border:1px solid #ddd; border-radius:8px; font-size:13px; }
    textarea { resize:vertical; min-height:70px; }
    .btn-big { width:100%; padding:13px; border:none; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:8px; }
    .stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
    .stat { background:white; border-radius:8px; padding:12px; text-align:center; }
    .stat-num { font-size:20px; font-weight:700; color:#FF6B35; }
    .stat-lbl { font-size:10px; color:#888; }
    .link { text-align:center; margin-top:8px; font-size:12px; color:#FF6B35; cursor:pointer; }
    .badge { padding:2px 6px; border-radius:6px; font-size:9px; font-weight:600; }
    .bg-y { background:#fff3cd; color:#856404; }
    .bg-g { background:#d4edda; color:#155724; }
    .bg-r { background:#f8d7da; color:#721C24; }
    .row { display:flex; justify-content:space-between; align-items:flex-start; padding:8px 0; border-bottom:1px solid #eee; font-size:12px; gap:8px; }
    .map-wrap { flex:1; min-height:300px; }
    .tb { display:flex; gap:4px; padding:6px; background:white; border-bottom:1px solid #eee; }
    .foto-thumb { width:50px;height:50px;object-fit:cover;border-radius:6px;margin:2px;cursor:pointer; }
    .up-btn { display:inline-block; padding:8px 16px; background:#f0f0f0; border-radius:6px; cursor:pointer; font-size:12px; }
    .up-btn input { display:none; }
    .pts { background:#FF6B35; color:white; border-radius:20px; padding:4px 12px; font-size:13px; font-weight:700; display:inline-block; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="cont" style="justify-content:center;">
    <div class="card">
      <h2 style="text-align:center;color:#FF6B35;">📍 Lokasi Sekitar</h2>
      <p style="text-align:center;color:#888;font-size:10px;">v1.4 — Stable</p>
      <div class="fg"><input id="loginEmail" type="email" placeholder="Email"></div>
      <div class="fg"><input id="loginPassword" type="password" placeholder="Password"></div>
      <button class="btn-big btn-o" onclick="doLogin()">Masuk</button>
      <div class="link" onclick="switchTo('register')">Belum punya akun? Daftar</div>
    </div>
  </div>
</div>

<!-- REGISTER -->
<div id="register" class="screen">
  <div class="cont" style="justify-content:center;">
    <div class="card">
      <h2 style="text-align:center;color:#FF6B35;">📝 Daftar</h2>
      <div class="fg"><input id="regNama" placeholder="Nama"></div>
      <div class="fg"><input id="regEmail" type="email" placeholder="Email"></div>
      <div class="fg"><input id="regPassword" type="password" placeholder="Password (min 6)"></div>
      <div class="fg"><select id="regRole"><option value="informan">🔍 Informan</option><option value="pedagang">🛒 Pedagang</option></select></div>
      <button class="btn-big btn-o" onclick="doRegister()">Daftar</button>
      <div class="link" onclick="switchTo('login')">Sudah punya akun? Masuk</div>
    </div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
  <div class="hdr"><div><h1>🛡️ Admin</h1><div class="hdr-sub" id="adminName"></div></div><div><button class="btn-sm btn-out" onclick="switchTo('mapView')">🗺️</button><button class="btn-sm btn-out" onclick="doLogout()">Keluar</button></div></div>
  <div class="cont">
    <div class="stats"><div class="stat"><div class="stat-num" id="s1">-</div><div class="stat-lbl">Lokasi</div></div><div class="stat"><div class="stat-num" id="s2">-</div><div class="stat-lbl">User</div></div><div class="stat"><div class="stat-num" id="s3">-</div><div class="stat-lbl">Aktif</div></div><div class="stat"><div class="stat-num" id="s4">-</div><div class="stat-lbl">Pending</div></div></div>
    <div class="card"><h3 style="font-size:13px;margin-bottom:6px;">📋 Verifikasi</h3><div id="adminList"></div></div>
  </div>
</div>

<!-- INFORMAN -->
<div id="informan" class="screen">
  <div class="hdr"><div><h1>🔍 Informan</h1><div class="hdr-sub" id="infName"></div></div><div><span class="pts" id="infPoin">0 ⭐</span><button class="btn-sm btn-out" onclick="switchTo('mapView')">🗺️</button><button class="btn-sm btn-out" onclick="doLogout()">Keluar</button></div></div>
  <div class="cont">
    <button class="btn-big btn-o" onclick="switchTo('laporForm')">📸 Lapor PKL</button>
    <button class="btn-big btn-w" onclick="switchTo('histori')">📋 Riwayat Laporan</button>
    <button class="btn-big btn-w" onclick="switchTo('mapView')">🗺️ Peta</button>
  </div>
</div>

<!-- LAPOR FORM -->
<div id="laporForm" class="screen">
  <div class="hdr"><div><h1>📸 Lapor PKL</h1></div><button class="btn-sm btn-out" onclick="switchTo('informan')">← Batal</button></div>
  <div class="cont">
    <div class="card">
      <div class="fg"><label>Foto (max 5)</label><label class="up-btn">📷 Buka Kamera <input type="file" id="laporFoto" accept="image/*" capture="environment" multiple onchange="previewLapor()"></label><div id="laporPrev" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;"></div></div>
      <div class="fg"><label>Deskripsi</label><textarea id="laporDesc" placeholder="Nama pedagang, jualan apa, lokasi..."></textarea></div>
      <div class="fg"><label>Kategori</label><select id="laporKat"><option value="1">🍜 Makanan</option><option value="2">🧋 Minuman</option><option value="3">🥬 Sayur</option><option value="4">👗 Pakaian</option><option value="5">💍 Aksesoris</option><option value="6">📱 Elektronik</option><option value="7">📍 Lainnya</option></select></div>
      <div id="laporStat" style="text-align:center;padding:8px;font-size:13px;color:#FF6B35;display:none;"></div>
      <button class="btn-big btn-o" onclick="submitLaporan()">🚀 Kirim</button>
    </div>
  </div>
</div>

<!-- HISTORI -->
<div id="histori" class="screen">
  <div class="hdr"><div><h1>📋 Riwayat</h1></div><button class="btn-sm btn-out" onclick="switchTo('informan')">← Kembali</button></div>
  <div class="cont" id="historiList"><p style="text-align:center;color:#888;padding:20px;">Memuat...</p></div>
</div>

<!-- PEDAGANG -->
<div id="pedagang" class="screen">
  <div class="hdr"><div><h1>🛒 Pedagang</h1><div class="hdr-sub" id="pedName"></div></div><div><button class="btn-sm btn-out" onclick="switchTo('mapView')">🗺️</button><button class="btn-sm btn-out" onclick="doLogout()">Keluar</button></div></div>
  <div class="cont">
    <button class="btn-big btn-o" onclick="loadLaporanSekitar()">🔍 Lihat Laporan Sekitar</button>
    <button class="btn-big btn-w" onclick="switchTo('daganganSaya')">📦 Dagangan Saya</button>
    <button class="btn-big btn-w" onclick="switchTo('mapView')">🗺️ Peta</button>
  </div>
</div>

<!-- LAPORAN SEKITAR -->
<div id="laporanSekitar" class="screen">
  <div class="hdr"><div><h1>🔍 Laporan Sekitar</h1></div><button class="btn-sm btn-out" onclick="switchTo('pedagang')">← Kembali</button></div>
  <div class="cont" id="laporanSekitarList"><p style="text-align:center;color:#888;">Memuat...</p></div>
</div>

<!-- DAGANGAN -->
<div id="daganganSaya" class="screen">
  <div class="hdr"><div><h1>📦 Dagangan</h1></div><button class="btn-sm btn-out" onclick="switchTo('pedagang')">← Kembali</button></div>
  <div class="cont">
    <button class="btn-big btn-o" onclick="tambahProduk()">+ Tambah Produk</button>
    <div id="daganganList"><p style="text-align:center;color:#888;">Memuat...</p></div>
  </div>
</div>

<!-- MAP -->
<div id="mapView" class="screen">
  <div class="hdr"><div><h1>🗺️ Peta</h1></div><div><button class="btn-sm btn-out" onclick="centerMyLoc()">🎯</button><button class="btn-sm btn-out" onclick="goBack()">←</button></div></div>
  <div class="tb"><button class="btn-sm btn-o" onclick="refreshMap()">🔄</button><button class="btn-sm btn-w" onclick="goBack()">Kembali</button></div>
  <div class="map-wrap" id="mapContainer"></div>
</div>

<script src="lib/supabase.min.js"></script>
<script src="lib/leaflet.js"></script>
<script>
// ===== INIT =====
var db, user, profile, myMap, markerLayer, prevScreen;
var SUPABASE_URL = 'https://dnpbyfpbbwkgsfwmzlva.supabase.co';
var SUPABASE_KEY = 'sb_publishable_XV71tP1dBZMyHg30p3aWIw_Phv5hbay';

function init() {
  if (typeof supabase !== 'undefined') {
    db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    checkSession();
  } else {
    setTimeout(init, 500);
  }
}

async function checkSession() {
  try {
    var r = await db.auth.getSession();
    if (r.data.session) {
      user = r.data.session.user;
      var p = await db.from('profiles').select('*').eq('id', user.id).single();
      if (p.data) { profile = p.data; switchTo(profile.role); }
    }
  } catch(e) {}
}

function switchTo(id) {
  prevScreen = document.querySelector('.screen.active') ? document.querySelector('.screen.active').id : 'login';
  document.querySelectorAll('.screen').forEach(function(s) { s.classList.remove('active'); });
  var el = document.getElementById(id);
  if (!el) { alert('Screen "'+id+'" not found!'); return; }
  el.classList.add('active');
  if (id === 'admin') { document.getElementById('adminName').textContent = profile ? profile.nama : ''; loadAdmin(); }
  if (id === 'informan') { document.getElementById('infName').textContent = profile ? profile.nama : ''; document.getElementById('infPoin').textContent = (profile ? profile.poin || 0 : 0) + ' ⭐'; }
  if (id === 'pedagang') { document.getElementById('pedName').textContent = profile ? profile.nama : ''; }
  if (id === 'histori') loadHistori();
  if (id === 'daganganSaya') loadDagangan();
  if (id === 'mapView') initMap();
}

function goBack() {
  if (prevScreen && document.getElementById(prevScreen)) switchTo(prevScreen);
  else switchTo(profile ? profile.role : 'login');
}

// Helper: open Google Maps
function openMap(lat, lng) {
  var url = 'https://www.google.com/maps?q=' + lat + ',' + lng;
  try { window.open(url, '_system'); } catch(e) { location.href = url; }
}

// Helper: open image full screen
function openImage(url) {
  try { window.open(url, '_system'); } catch(e) { location.href = url; }
}

// ===== AUTH =====
async function doLogin() {
  if (!db) { alert('Menghubungkan server...'); return; }
  var e = document.getElementById('loginEmail').value.trim();
  var p = document.getElementById('loginPassword').value.trim();
  if (!e || !p) { alert('Isi email dan password'); return; }
  var r = await db.auth.signInWithPassword({ email: e, password: p });
  if (r.error) { alert('Gagal: '+r.error.message); return; }
  user = r.data.user;
  var prof = await db.from('profiles').select('*').eq('id', user.id).single();
  if (!prof.data) { alert('Profile tidak ditemukan. Hubungi admin.'); return; }
  profile = prof.data;
  switchTo(profile.role);
}

async function doRegister() {
  var n = document.getElementById('regNama').value.trim();
  var e = document.getElementById('regEmail').value.trim();
  var p = document.getElementById('regPassword').value.trim();
  var rl = document.getElementById('regRole').value;
  if (!n || !e || !p) { alert('Isi semua field'); return; }
  if (p.length < 6) { alert('Password minimal 6 karakter'); return; }
  var r = await db.auth.signUp({ email: e, password: p });
  if (r.error) { alert('Gagal: '+r.error.message); return; }
  await db.from('profiles').update({ nama: n, role: rl }).eq('id', r.data.user.id);
  alert('✅ Registrasi berhasil! Silakan login.'); switchTo('login');
}

async function doLogout() { await db.auth.signOut(); user = null; profile = null; switchTo('login'); }

// ===== ADMIN =====
async function loadAdmin() {
  var l = await db.from('lokasi').select('id',{count:'exact',head:true});
  var la = await db.from('lokasi').select('id',{count:'exact',head:true}).eq('status','aktif');
  var u = await db.from('profiles').select('id',{count:'exact',head:true});
  document.getElementById('s1').textContent = l.count||0;
  document.getElementById('s2').textContent = u.count||0;
  document.getElementById('s3').textContent = la.count||0;
  document.getElementById('s4').textContent = la.count||0;
  
  var d = await db.from('lokasi').select('*').order('created_at',{ascending:false}).limit(20);
  var userIds = []; if (d.data) d.data.forEach(function(loc) { userIds.push(loc.user_id); });
  var nameMap = {};
  if (userIds.length > 0) {
    var np = await db.from('profiles').select('id,nama').in('id', userIds);
    if (np.data) np.data.forEach(function(p) { nameMap[p.id] = p.nama || '?'; });
  }
  
  var h = '';
  if (d.data && d.data.length > 0) {
    d.data.forEach(function(loc) {
      var b = '<span class="badge bg-'+(loc.status==='diverifikasi'?'g':loc.status==='ditolak'?'r':'y')+'">'+loc.status+'</span>';
      var f = '';
      if (loc.foto_url && Array.isArray(loc.foto_url)) {
        loc.foto_url.forEach(function(u) { f += '<img src="'+u+'" class="foto-thumb" onclick="openImage(\\\''+u+'\\\')" onerror="this.style.display=\\\'none\\\'" style="width:50px;height:50px;object-fit:cover;border-radius:6px;margin:2px;cursor:pointer;">'; });
      }
      h += '<div class="row"><div><b>'+(loc.deskripsi||'Tanpa nama')+'</b> <small>'+nameMap[loc.user_id]+'</small><br><small>'+new Date(loc.created_at).toLocaleDateString('id-ID')+' '+b+'</small>'+f+'</div>';
      h += '<div style="display:flex;gap:3px;">';
      if (loc.status==='aktif') h += '<button class="btn-sm btn-g" onclick="verify('+loc.id+')">✅</button>';
      if (loc.status==='aktif') h += '<button class="btn-sm btn-r" onclick="reject('+loc.id+')">❌</button>';
      h += '<button class="btn-sm btn-r" onclick="del('+loc.id+')">🗑️</button></div></div>';
    });
  } else h = '<p style="text-align:center;color:#888;padding:20px;">Belum ada lokasi</p>';
  document.getElementById('adminList').innerHTML = h;
}
async function verify(id) { await db.from('lokasi').update({status:'diverifikasi'}).eq('id',id); var l=await db.from('lokasi').select('user_id').eq('id',id).single(); if(l.data) await db.rpc('increment_poin',{uid:l.data.user_id,amount:10}); loadAdmin(); }
async function reject(id) { await db.from('lokasi').update({status:'ditolak'}).eq('id',id); loadAdmin(); }
async function del(id) { if(confirm('Hapus?')) { await db.from('lokasi').delete().eq('id',id); loadAdmin(); } }

// ===== INFORMAN =====
function previewLapor() {
  var pv = document.getElementById('laporPrev'); pv.innerHTML = '';
  var files = document.getElementById('laporFoto').files;
  for (var i = 0; i < Math.min(files.length||0, 5); i++) {
    (function(f) {
      var fr = new FileReader();
      fr.onload = function(e) { var img = document.createElement('img'); img.src = e.target.result; img.style.cssText='width:60px;height:60px;object-fit:cover;border-radius:6px;margin:3px;'; pv.appendChild(img); };
      fr.readAsDataURL(f);
    })(files[i]);
  }
}

async function submitLaporan() {
  var desc = document.getElementById('laporDesc').value.trim();
  var kat = document.getElementById('laporKat').value;
  var files = document.getElementById('laporFoto').files;
  var st = document.getElementById('laporStat'); st.style.display='block';
  
  if (!navigator.geolocation) { alert('GPS tidak didukung'); switchTo('informan'); return; }
  
  st.textContent = '📡 Mengambil lokasi...';
  navigator.geolocation.getCurrentPosition(async function(pos) {
    st.textContent = '📤 Upload foto...';
    var fotoUrls = [];
    var fotoErrors = 0;
    if (files && files.length > 0) {
      for (var i = 0; i < Math.min(files.length, 5); i++) {
        var f = files[i]; var fn = user.id+'/'+Date.now()+'_'+i+'.'+(f.name.split('.').pop()||'jpg');
        var up = await db.storage.from('pkl-photos').upload(fn, f, {contentType:f.type,upsert:false});
        if (up.error) { fotoErrors++; fotoUrls.push('ERROR:'+up.error.message); }
        else {
          var u = db.storage.from('pkl-photos').getPublicUrl(fn);
          if (u.data && u.data.publicUrl) fotoUrls.push(u.data.publicUrl);
        }
      }
    }
    st.textContent = '💾 Menyimpan...';
    var ld = {user_id:user.id,latitude:pos.coords.latitude,longitude:pos.coords.longitude,deskripsi:desc||'PKL ditemukan',kategori_id:parseInt(kat),status:'aktif'};
    if (fotoUrls.length > 0) ld.foto_url = fotoUrls;
    var r = await db.from('lokasi').insert(ld);
    st.style.display='none';
    if (r.error) { alert('❌ '+r.error.message); }
    else {
      var msg = '✅ Laporan terkirim!';
      if (fotoUrls.length > 0) {
        var ok = fotoUrls.filter(function(u) { return !u.startsWith('ERROR:'); });
        var errs = fotoUrls.filter(function(u) { return u.startsWith('ERROR:'); });
        if (ok.length > 0) msg += '\n📸 '+ok.length+' foto berhasil';
        if (errs.length > 0) msg += '\n❌ Gagal: '+errs[0].replace('ERROR:','');
      }
      msg += '\n+5 poin';
      alert(msg);
      await db.rpc('increment_poin',{uid:user.id,amount:5});
      document.getElementById('laporDesc').value=''; document.getElementById('laporKat').value='7';
      document.getElementById('laporFoto').value=''; document.getElementById('laporPrev').innerHTML='';
    }
    switchTo('informan');
  }, function(err) { st.style.display='none'; alert('❌ '+err.message); switchTo('informan'); }, {enableHighAccuracy:true});
}

async function loadHistori() {
  var d = await db.from('lokasi').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
  var h = '<h3>📋 Riwayat Laporan</h3>';
  if (d.data && d.data.length>0) {
    d.data.forEach(function(loc) {
      var b = '<span class="badge bg-'+(loc.status==='diverifikasi'?'g':loc.status==='ditolak'?'r':'y')+'">'+loc.status+'</span>';
      var f = '';
      if (loc.foto_url && Array.isArray(loc.foto_url)) loc.foto_url.forEach(function(u) { f += '<img src="'+u+'" class="foto-thumb" onerror="this.style.display=\\\'none\\\'">'; });
      h += '<div class="card"><div style="display:flex;justify-content:space-between;"><b>'+(loc.deskripsi||'PKL')+'</b>'+b+'</div>';
      h += '<div style="font-size:11px;color:#888;">'+new Date(loc.created_at).toLocaleString('id-ID')+'</div>';
      if (f) h += '<div>'+f+'</div></div>';
    });
  } else h += '<p style="text-align:center;color:#888;">Belum ada laporan</p>';
  document.getElementById('historiList').innerHTML = h;
}

// ===== PEDAGANG =====
async function loadLaporanSekitar() {
  switchTo('laporanSekitar');
  document.getElementById('laporanSekitarList').innerHTML = '<p style="text-align:center;color:#888;">Memuat...</p>';
  
  var d = await db.from('lokasi').select('*').in('status',['aktif','diverifikasi']).order('created_at',{ascending:false}).limit(20);
  var userIds = []; if (d.data) d.data.forEach(function(loc) { userIds.push(loc.user_id); });
  var nameMap = {};
  if (userIds.length>0) { var np = await db.from('profiles').select('id,nama').in('id',userIds); if (np.data) np.data.forEach(function(p) { nameMap[p.id]=p.nama||'?'; }); }
  
  var h = '<h3>📋 Laporan PKL Sekitar</h3>';
  if (d.data && d.data.length>0) {
    d.data.forEach(function(loc) {
      var b = '<span class="badge bg-'+(loc.status==='diverifikasi'?'g':'y')+'">'+loc.status+'</span>';
      var f = '';
      if (loc.foto_url && Array.isArray(loc.foto_url)) loc.foto_url.forEach(function(u) { f += '<img src="'+u+'" class="foto-thumb" onerror="this.style.display=\\\'none\\\'">'; });
      h += '<div class="card"><b>'+(loc.deskripsi||'PKL')+'</b> '+b;
      h += '<div style="font-size:11px;color:#888;">👤 '+(nameMap[loc.user_id]||'?')+' | '+new Date(loc.created_at).toLocaleDateString('id-ID')+'</div>';
      if (f) h += '<div>'+f+'</div>';
      h += '<div style="margin-top:6px;display:flex;gap:4px;">';
      h += '<button class="btn-sm btn-g" onclick="beriPoin(\''+loc.user_id+'\',\''+(nameMap[loc.user_id]||'?')+'\')">⭐ Beri Poin</button>';
      h += '<button class="btn-sm btn-o" onclick="openMap('+loc.latitude+','+loc.longitude+')">🗺️ Maps</button>';
      h += '</div></div>';
    });
  } else h += '<p style="text-align:center;color:#888;">Belum ada laporan</p>';
  document.getElementById('laporanSekitarList').innerHTML = h;
}

function beriPoin(uid, nama) {
  var j = prompt('Poin untuk '+(nama||'informan')+'?');
  if (!j || isNaN(j) || parseInt(j)<1) return;
  db.rpc('increment_poin',{uid:uid,amount:parseInt(j)}).then(function() { alert('✅ Poin diberikan!'); });
}

async function loadDagangan() {
  var d = await db.from('produk').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
  var h = '<h3>📦 Dagangan Saya</h3>';
  if (d.data && d.data.length>0) {
    d.data.forEach(function(p) {
      h += '<div class="card"><div style="display:flex;justify-content:space-between;"><b>📦 '+p.nama_produk+'</b><span style="color:#FF6B35;">'+(p.harga||'')+'</span></div>';
      h += '<button class="btn-sm btn-r" onclick="hapusProduk('+p.id+')">🗑️ Hapus</button></div>';
    });
  } else h += '<p style="text-align:center;color:#888;">Belum ada produk</p>';
  document.getElementById('daganganList').innerHTML = h;
}

function tambahProduk() {
  var n = prompt('Nama produk:'); if (!n) return;
  var h = prompt('Harga:'); db.from('produk').insert({user_id:user.id,nama_produk:n,harga:h||''}).then(function(r) {
    if (r.error) alert('Gagal: '+r.error.message); else { alert('✅ Ditambahkan!'); loadDagangan(); }
  });
}

async function hapusProduk(id) { if (confirm('Hapus?')) { await db.from('produk').delete().eq('id',id); loadDagangan(); } }

// ===== MAP =====
function initMap() {
  setTimeout(function() {
    var c = document.getElementById('mapContainer');
    if (myMap) { myMap.invalidateSize(); loadMarkers(); return; }
    L.Icon.Default.imagePath = 'lib/images/';
    myMap = L.map('mapContainer').setView([-6.2,106.8],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(myMap);
    markerLayer = L.layerGroup().addTo(myMap); loadMarkers();
  }, 300);
}
async function loadMarkers() {
  if (!myMap||!markerLayer) return; markerLayer.clearLayers();
  var d = await db.from('lokasi').select('*').in('status',['aktif','diverifikasi']).order('created_at',{ascending:false});
  if (d.data && d.data.length>0) {
    var b = [];
    d.data.forEach(function(loc) {
      var pc = '<b>📍 '+(loc.deskripsi||'PKL')+'</b><br><small>'+new Date(loc.created_at).toLocaleDateString('id-ID')+'</small>';
      if (loc.foto_url && Array.isArray(loc.foto_url) && loc.foto_url.length>0) pc += '<br><img src="'+loc.foto_url[0]+'" style="width:120px;border-radius:6px;margin-top:3px;">';
      L.marker([loc.latitude,loc.longitude]).addTo(markerLayer).bindPopup(pc); b.push([loc.latitude,loc.longitude]);
    });
    myMap.fitBounds(b,{padding:[30,30]});
  }
}
function refreshMap() { loadMarkers(); }
function centerMyLoc() {
  if (!myMap) return;
  if (navigator.geolocation) navigator.geolocation.getCurrentPosition(function(pos) {
    myMap.setView([pos.coords.latitude,pos.coords.longitude],15);
    L.circleMarker([pos.coords.latitude,pos.coords.longitude],{radius:8,color:'#FF6B35',fillColor:'#FF6B35',fillOpacity:0.5}).addTo(markerLayer).bindPopup('📍 Posisi kamu');
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>
