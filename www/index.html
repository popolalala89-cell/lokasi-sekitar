<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lokasi Sekitar</title>
  <link rel="stylesheet" href="lib/leaflet.css" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Arial,sans-serif;background:#f5f5f5}
    .pg{display:none}
    #loginPg{display:block}
    .box{background:white;padding:24px;border-radius:16px;width:90%;max-width:350px;margin:40px auto;box-shadow:0 4px 20px rgba(0,0,0,0.1)}
    .box h2{text-align:center;color:#FF6B35;margin-bottom:14px}
    .inp{width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px}
    .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:6px}
    .btn-o{background:#FF6B35;color:#fff}.btn-w{background:#fff;color:#333;border:1px solid #ddd}
    .btn-g{background:#28a745;color:#fff}.btn-r{background:#dc3545;color:#fff}
    .btn-sm{padding:5px 10px;font-size:11px;border-radius:5px;cursor:pointer;border:none;margin:2px}
    .link{text-align:center;color:#FF6B35;font-size:13px;cursor:pointer;display:block;margin-top:8px}
    .hdr{background:linear-gradient(135deg,#FF6B35,#F7931E);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
    .hdr h3{font-size:15px}.hdr s{font-size:10px;opacity:0.8}
    .main{padding:12px;max-width:600px;margin:0 auto}
    .card{background:#fff;border-radius:10px;padding:12px;box-shadow:0 1px 6px rgba(0,0,0,0.05);margin-bottom:8px}
    .row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid #eee;font-size:12px;gap:6px}
    .badge{padding:2px 6px;border-radius:6px;font-size:9px;font-weight:600}
    .bg-y{background:#fff3cd;color:#856404}.bg-g{background:#d4edda;color:#155724}.bg-r{background:#f8d7da;color:#721C24}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
    .stat{background:#fff;border-radius:8px;padding:10px;text-align:center}
    .stat b{font-size:18px;color:#FF6B35;display:block}.stat s{font-size:9px;color:#888}
    .thumb{width:50px;height:50px;object-fit:cover;border-radius:6px;margin:2px;cursor:pointer}
    #mapDiv{height:350px}
  </style>
</head>
<body>

<!-- LOGIN (always shown first) -->
<div id="loginPg" class="pg">
  <div class="box">
    <h2>📍 Lokasi Sekitar</h2>
    <input id="lemail" class="inp" type="email" placeholder="Email">
    <input id="lpass" class="inp" type="password" placeholder="Password">
    <button class="btn btn-o" onclick="doLogin()">Masuk</button>
    <span class="link" onclick="showPg('regPg')">Daftar akun baru</span>
  </div>
</div>

<!-- REGISTER -->
<div id="regPg" class="pg">
  <div class="box">
    <h2>📝 Daftar</h2>
    <input id="rnama" class="inp" placeholder="Nama">
    <input id="remail" class="inp" type="email" placeholder="Email">
    <input id="rpass" class="inp" type="password" placeholder="Password (min 6)">
    <select id="rrole" class="inp"><option value="informan">🔍 Informan</option><option value="pedagang">🛒 Pedagang</option></select>
    <button class="btn btn-o" onclick="doRegister()">Daftar</button>
    <span class="link" onclick="showPg('loginPg')">Sudah punya akun? Masuk</span>
  </div>
</div>

<!-- ADMIN -->
<div id="adminPg" class="pg">
  <div class="hdr"><div><h3>🛡️ Admin</h3><s id="aname"></s></div><button class="btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="doLogout()">Keluar</button></div>
  <div class="main">
    <div class="stats"><div class="stat"><b id="s1">-</b><s>Lokasi</s></div><div class="stat"><b id="s2">-</b><s>User</s></div></div>
    <div class="card"><b>Verifikasi</b><div id="alist"></div></div>
  </div>
</div>

<!-- INFORMAN -->
<div id="infPg" class="pg">
  <div class="hdr"><div><h3>🔍 Informan</h3><s id="iname"></s></div><button class="btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="doLogout()">Keluar</button></div>
  <div class="main">
    <button class="btn btn-o" onclick="showPg('laporPg')">📸 Lapor PKL</button>
    <button class="btn btn-w" onclick="showPg('histPg')">📋 Riwayat</button>
    <button class="btn btn-w" onclick="showPg('mapPg')">🗺️ Peta</button>
  </div>
</div>

<!-- LAPOR -->
<div id="laporPg" class="pg">
  <div class="hdr"><div><h3>📸 Lapor</h3></div><button class="btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="showPg('infPg')">← Batal</button></div>
  <div class="main"><div class="card">
    <label style="display:block;text-align:center;padding:10px;background:#f0f0f0;border-radius:8px;cursor:pointer;margin-bottom:8px">📷 Ambil Foto <input type="file" id="lfoto" accept="image/*" capture="environment" multiple onchange="prevL()" style="display:none"></label>
    <div id="lprev" style="display:flex;flex-wrap:wrap;gap:3px;margin-bottom:8px"></div>
    <input id="ldesc" class="inp" placeholder="Deskripsi (nama, jualan apa)">
    <select id="lkat" class="inp"><option value="1">🍜 Makanan</option><option value="2">🧋 Minuman</option><option value="3">🥬 Sayur</option><option value="4">👗 Pakaian</option><option value="5">💍 Aksesoris</option><option value="6">📱 Elektronik</option><option value="7">📍 Lainnya</option></select>
    <div id="lstat" style="text-align:center;color:#FF6B35;display:none;padding:6px"></div>
    <button class="btn btn-o" onclick="submitL()">🚀 Kirim</button>
  </div></div>
</div>

<!-- HISTORI -->
<div id="histPg" class="pg">
  <div class="hdr"><div><h3>📋 Riwayat</h3></div><button class="btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="showPg('infPg')">← Kembali</button></div>
  <div class="main" id="hlist"></div>
</div>

<!-- PEDAGANG -->
<div id="pedPg" class="pg">
  <div class="hdr"><div><h3>🛒 Pedagang</h3><s id="pname"></s></div><button class="btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="doLogout()">Keluar</button></div>
  <div class="main">
    <button class="btn btn-o" onclick="loadSekitar()">🔍 Laporan Sekitar</button>
    <button class="btn btn-w" onclick="showPg('dagPg')">📦 Dagangan Saya</button>
    <button class="btn btn-w" onclick="showPg('mapPg')">🗺️ Peta</button>
  </div>
</div>

<!-- SEKITAR -->
<div id="sekPg" class="pg">
  <div class="hdr"><div><h3>🔍 Laporan Sekitar</h3></div><button class="btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="showPg('pedPg')">← Kembali</button></div>
  <div class="main" id="slist"></div>
</div>

<!-- DAGANGAN -->
<div id="dagPg" class="pg">
  <div class="hdr"><div><h3>📦 Dagangan</h3></div><button class="btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="showPg('pedPg')">← Kembali</button></div>
  <div class="main">
    <button class="btn btn-o" onclick="addProduk()">+ Tambah</button>
    <div id="dlist"></div>
  </div>
</div>

<!-- MAP -->
<div id="mapPg" class="pg">
  <div class="hdr"><div><h3>🗺️ Peta</h3></div><button class="btn-sm" style="background:rgba(255,255,255,0.2);color:#fff" onclick="goBack()">←</button></div>
  <div class="main"><div id="mapDiv"></div></div>
</div>

<script src="lib/supabase.min.js"></script>
<script src="lib/leaflet.js"></script>
<script>
var db, user, profile, myMap, markerLayer, prevPg;
var SUPABASE_URL='https://dnpbyfpbbwkgsfwmzlva.supabase.co';
var SUPABASE_KEY='sb_publishable_XV71tP1dBZMyHg30p3aWIw_Phv5hbay';

function init(){
  if(typeof supabase!=='undefined'){db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);checkSession()}
  else setTimeout(init,500)
}
async function checkSession(){
  try{var r=await db.auth.getSession();if(r.data.session){user=r.data.session.user;var p=await db.from('profiles').select('*').eq('id',user.id).single();if(p.data){profile=p.data;showPg(pageForRole(profile.role))}}}
  catch(e){}
}
function pageForRole(role){
  var map={informan:'infPg',pedagang:'pedPg',admin:'adminPg'};
  return map[role]||'loginPg';
}
function showPg(id){
  try {
    // Check target exists FIRST before hiding anything
    var el=document.getElementById(id);
    if(!el){alert('Page not found: '+id);return;}
    // Save current page for back navigation
    var cur=document.querySelector('.pg:not([style*="display:none"])');
    prevPg=cur?cur.id:'loginPg';
    // Hide all, show target
    document.querySelectorAll('.pg').forEach(function(p){p.style.display='none'});
    el.style.display='block';
    if(id==='adminPg'){document.getElementById('aname').textContent=profile?profile.nama:'';loadAdmin()}
    if(id==='infPg')document.getElementById('iname').textContent=profile?profile.nama:''
    if(id==='pedPg')document.getElementById('pname').textContent=profile?profile.nama:''
    if(id==='histPg')loadHist()
    if(id==='dagPg')loadDag()
    if(id==='mapPg')initMap()
  } catch(e) { alert('showPg error: '+e.message); }
}
function goBack(){if(prevPg&&document.getElementById(prevPg))showPg(prevPg);else showPg(profile?pageForRole(profile.role):'loginPg')}

// AUTH
async function doLogin(){
  if(!db)return;var e=document.getElementById('lemail').value.trim(),p=document.getElementById('lpass').value.trim();
  if(!e||!p){alert('Isi email dan password');return}
  try{var r=await db.auth.signInWithPassword({email:e,password:p});if(r.error){alert('Gagal: '+r.error.message);return}
  user=r.data.user;var pr=await db.from('profiles').select('*').eq('id',user.id).single();if(!pr.data){alert('Profile tidak ditemukan');return}
  profile=pr.data;showPg(pageForRole(profile.role))}catch(err){alert('Error: '+err.message)}
}
async function doRegister(){
  var n=document.getElementById('rnama').value.trim(),e=document.getElementById('remail').value.trim(),p=document.getElementById('rpass').value.trim(),rl=document.getElementById('rrole').value;
  if(!n||!e||!p){alert('Isi semua field');return}if(p.length<6){alert('Password min 6');return}
  var r=await db.auth.signUp({email:e,password:p});if(r.error){alert('Gagal: '+r.error.message);return}
  await db.from('profiles').update({nama:n,role:rl}).eq('id',r.data.user.id);alert('✅ Registrasi berhasil!');showPg('loginPg')
}
async function doLogout(){await db.auth.signOut();user=null;profile=null;showPg('loginPg')}

// ADMIN
async function loadAdmin(){
  var l=await db.from('lokasi').select('id',{count:'exact',head:true}),u=await db.from('profiles').select('id',{count:'exact',head:true});
  document.getElementById('s1').textContent=l.count||0;document.getElementById('s2').textContent=u.count||0;
  var d=await db.from('lokasi').select('*').order('created_at',{ascending:false}).limit(20);
  var ids=[];if(d.data)d.data.forEach(function(loc){ids.push(loc.user_id)});
  var nm={};if(ids.length>0){var np=await db.from('profiles').select('id,nama').in('id',ids);if(np.data)np.data.forEach(function(p){nm[p.id]=p.nama||'?'})}
  var h='';if(d.data&&d.data.length>0){d.data.forEach(function(loc){
    var b='<span class="badge bg-'+(loc.status==='diverifikasi'?'g':loc.status==='ditolak'?'r':'y')+'">'+loc.status+'</span>';
    var f='';if(loc.foto_url&&Array.isArray(loc.foto_url))loc.foto_url.forEach(function(u){f+='<img src="'+u+'" class="thumb" onclick="openUrl(\\\''+u+'\\\')">'});
    h+='<div class="row"><div><b>'+(loc.deskripsi||'PKL')+'</b> '+nm[loc.user_id]+'<br>'+b+' '+f+'</div><div>';
    if(loc.status==='aktif')h+='<button class="btn-sm btn-g" onclick="verify('+loc.id+')">✅</button> ';
    if(loc.status==='aktif')h+='<button class="btn-sm btn-r" onclick="reject('+loc.id+')">❌</button> ';
    h+='<button class="btn-sm btn-r" onclick="del('+loc.id+')">🗑️</button></div></div>';
  })}else h='<p style="text-align:center;color:#888;padding:20px;">Belum ada data</p>';
  document.getElementById('alist').innerHTML=h
}
async function verify(id){await db.from('lokasi').update({status:'diverifikasi'}).eq('id',id);var l=await db.from('lokasi').select('user_id').eq('id',id).single();if(l.data)await db.rpc('increment_poin',{uid:l.data.user_id,amount:10});loadAdmin()}
async function reject(id){await db.from('lokasi').update({status:'ditolak'}).eq('id',id);loadAdmin()}
async function del(id){if(confirm('Hapus?')){await db.from('lokasi').delete().eq('id',id);loadAdmin()}}

// INFORMAN
function prevL(){var pv=document.getElementById('lprev');pv.innerHTML='';var fs=document.getElementById('lfoto').files;for(var i=0;i<Math.min(fs.length||0,5);i++){(function(f){var fr=new FileReader();fr.onload=function(e){var img=document.createElement('img');img.src=e.target.result;img.style.cssText='width:60px;height:60px;object-fit:cover;border-radius:6px;margin:2px';pv.appendChild(img)};fr.readAsDataURL(f)})(fs[i])}}
async function submitL(){
  var desc=document.getElementById('ldesc').value.trim(),kat=document.getElementById('lkat').value,fs=document.getElementById('lfoto').files,st=document.getElementById('lstat');
  st.style.display='block';if(!navigator.geolocation){alert('GPS tidak didukung');showPg('infPg');return}
  st.textContent='📡 Ambil lokasi...';
  navigator.geolocation.getCurrentPosition(async function(pos){
    st.textContent='📤 Upload...';var urls=[],errs=[];
    if(fs&&fs.length>0){for(var i=0;i<Math.min(fs.length,5);i++){
      var f=fs[i],fn=user.id+'/'+Date.now()+'_'+i+'.'+(f.name.split('.').pop()||'jpg');
      var up=await db.storage.from('pkl-photos').upload(fn,f,{contentType:f.type,upsert:false});
      if(up.error)errs.push(up.error.message);else{var u=db.storage.from('pkl-photos').getPublicUrl(fn);if(u.data&&u.data.publicUrl)urls.push(u.data.publicUrl)}
    }}
    var ld={user_id:user.id,latitude:pos.coords.latitude,longitude:pos.coords.longitude,deskripsi:desc||'PKL',kategori_id:parseInt(kat),status:'aktif'};
    if(urls.length>0)ld.foto_url=urls;
    var r=await db.from('lokasi').insert(ld);st.style.display='none';
    var msg='✅ Laporan terkirim!';if(urls.length>0)msg+='\n📸 '+urls.length+' foto';if(errs.length>0)msg+='\n❌ '+errs[0];msg+='\n+5 poin';alert(msg);
    await db.rpc('increment_poin',{uid:user.id,amount:5});
    document.getElementById('ldesc').value='';document.getElementById('lkat').value='7';document.getElementById('lfoto').value='';document.getElementById('lprev').innerHTML='';
    showPg('infPg')
  },function(err){st.style.display='none';alert('❌ '+err.message);showPg('infPg')},{enableHighAccuracy:true})
}
async function loadHist(){
  var d=await db.from('lokasi').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
  var h='';if(d.data&&d.data.length>0){d.data.forEach(function(loc){
    var b='<span class="badge bg-'+(loc.status==='diverifikasi'?'g':loc.status==='ditolak'?'r':'y')+'">'+loc.status+'</span>';
    var f='';if(loc.foto_url&&Array.isArray(loc.foto_url))loc.foto_url.forEach(function(u){f+='<img src="'+u+'" class="thumb" onclick="openUrl(\\\''+u+'\\\')">'});
    h+='<div class="card"><b>'+(loc.deskripsi||'PKL')+'</b> '+b+'<br><small>'+new Date(loc.created_at).toLocaleString('id-ID')+'</small><br>'+f+'</div>';
  })}else h='<p style="text-align:center;color:#888;padding:20px;">Belum ada laporan</p>';
  document.getElementById('hlist').innerHTML=h
}

// PEDAGANG
async function loadSekitar(){
  showPg('sekPg');document.getElementById('slist').innerHTML='<p style="text-align:center;color:#888;">Memuat...</p>';
  var d=await db.from('lokasi').select('*').eq('status','diverifikasi').order('created_at',{ascending:false}).limit(20);
  var ids=[];if(d.data)d.data.forEach(function(loc){ids.push(loc.user_id)});
  var nm={};if(ids.length>0){var np=await db.from('profiles').select('id,nama').in('id',ids);if(np.data)np.data.forEach(function(p){nm[p.id]=p.nama||'?'})}
  var h='';if(d.data&&d.data.length>0){d.data.forEach(function(loc){
    var f='';if(loc.foto_url&&Array.isArray(loc.foto_url))loc.foto_url.forEach(function(u){f+='<img src="'+u+'" class="thumb" onclick="openUrl(\\\''+u+'\\\')">'});
    h+='<div class="card"><b>'+(loc.deskripsi||'PKL')+'</b><br><small>👤 '+(nm[loc.user_id]||'?')+' | '+new Date(loc.created_at).toLocaleDateString('id-ID')+'</small><br>'+f;
    h+='<br><button class="btn-sm btn-g" onclick="beriPoin(\\\''+loc.user_id+'\\\',\\\''+(nm[loc.user_id]||'?')+'\\\')">⭐ Poin</button> ';
    h+='<button class="btn-sm btn-o" onclick="openMap('+loc.latitude+','+loc.longitude+')">🗺️ Maps</button></div>';
  })}else h='<p style="text-align:center;color:#888;">Belum ada laporan diverifikasi</p>';
  document.getElementById('slist').innerHTML=h
}
function beriPoin(uid,nama){var j=prompt('Poin untuk '+(nama||'?')+'? (10-50)');if(!j||isNaN(j)||parseInt(j)<1)return;db.rpc('increment_poin',{uid:uid,amount:parseInt(j)}).then(function(){alert('✅ Poin diberikan!')})}
async function loadDag(){
  var d=await db.from('produk').select('*').eq('user_id',user.id).order('created_at',{ascending:false});
  var h='';if(d.data&&d.data.length>0){d.data.forEach(function(p){h+='<div class="card"><b>📦 '+p.nama_produk+'</b> <span style="color:#FF6B35">'+(p.harga||'')+'</span><br><button class="btn-sm btn-r" onclick="delProduk('+p.id+')">🗑️</button></div>'})}else h='<p style="text-align:center;color:#888;">Belum ada produk</p>';
  document.getElementById('dlist').innerHTML=h
}
function addProduk(){var n=prompt('Nama produk:');if(!n)return;var h=prompt('Harga:');db.from('produk').insert({user_id:user.id,nama_produk:n,harga:h||''}).then(function(r){if(r.error)alert(r.error.message);else{alert('✅ Ditambah!');loadDag()}})}
async function delProduk(id){if(confirm('Hapus?')){await db.from('produk').delete().eq('id',id);loadDag()}}

// MAP
function initMap(){setTimeout(function(){var c=document.getElementById('mapDiv');if(myMap){myMap.invalidateSize();loadMarkers();return}L.Icon.Default.imagePath='lib/images/';myMap=L.map('mapDiv').setView([-6.2,106.8],13);L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(myMap);markerLayer=L.layerGroup().addTo(myMap);loadMarkers()},300)}
async function loadMarkers(){if(!myMap||!markerLayer)return;markerLayer.clearLayers();var d=await db.from('lokasi').select('*').in('status',['aktif','diverifikasi']).order('created_at',{ascending:false});if(d.data&&d.data.length>0){var b=[];d.data.forEach(function(loc){var pc='<b>📍 '+(loc.deskripsi||'PKL')+'</b><br>'+new Date(loc.created_at).toLocaleDateString('id-ID');if(loc.foto_url&&Array.isArray(loc.foto_url)&&loc.foto_url.length>0)pc+='<br><img src="'+loc.foto_url[0]+'" style="width:120px;border-radius:6px">';L.marker([loc.latitude,loc.longitude]).addTo(markerLayer).bindPopup(pc);b.push([loc.latitude,loc.longitude])});myMap.fitBounds(b,{padding:[30,30]})}}

// HELPERS
function openMap(lat,lng){var u='https://www.google.com/maps?q='+lat+','+lng;try{window.open(u,'_system')}catch(e){location.href=u}}
function openUrl(u){try{window.open(u,'_system')}catch(e){location.href=u}}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
